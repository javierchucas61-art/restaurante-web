<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* ========================================================= */
/* SMART DINING IA                                            */
/* ARCHIVO: menu.css                                          */
/* ESTILOS DE LA PÁGINA DEL MENÚ                              */
/* ========================================================= */


/* ========================================================= */
/* IMPORTAR FUENTE                                            */
/* ========================================================= */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');


/* ========================================================= */
/* RESET                                                      */
/* ========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* ========================================================= */
/* VARIABLES DE COLORES                                       */
/* CAMBIA AQUÍ LOS COLORES DEL SISTEMA                        */
/* ========================================================= */



/* ========================================================= */
/* BODY                                                       */
/* ========================================================= */

body{

   background-image: url(./img/fondo.png);
   background-size: cover;
   background-repeat: no-repeat;
   background-position: center;
   background-attachment: fixed;
    justify-content: center; /* CENTRAR HORIZONTAL */
    align-items: center;     /* CENTRAR VERTICAL */
}


/* ========================================================= */
/* NAVBAR                                                     */
/* ========================================================= */

.navbar{

    position:sticky;

    top:0;

    width:100%;

    background-image: url(./img/fondo.png);

    padding:18px 30px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 10px 25px rgba(0,0,0,.3);

    z-index:1000;

}


/* ========================================================= */
/* LOGO                                                       */
/* ========================================================= */

.logo{

    display:flex;

    align-items:center;

    gap:15px;

}

.logo img{

    width:55px;

}

.logo h2{

    font-size:24px;

}


/* ========================================================= */
/* ACCIONES                                                    */
/* ========================================================= */

.acciones{

    display:flex;

    align-items:center;

    gap:18px;

}


/* ========================================================= */
/* BOTÓN CATEGORÍAS                                           */
/* ========================================================= */

#btnCategorias{

    border:none;

    background:var(--principal);

   

    padding:12px 18px;

    border-radius:12px;

    cursor:pointer;

    transition:.3s;

    font-weight:bold;

}

#btnCategorias:hover{

    background:var(--principal-hover);

}


/* ========================================================= */
/* BUSCADOR                                                   */
/* ========================================================= */

.buscador{

    background:white;

    border-radius:50px;

    padding:10px 18px;

    display:flex;

    align-items:center;

    gap:10px;

}

.buscador i{

    color:#666;

}

.buscador input{

    border:none;

    outline:none;

    width:230px;

    font-size:15px;

}


/* ========================================================= */
/* CARRITO                                                    */
/* ========================================================= */

.carrito{

    position:relative;

    color:white;

    font-size:24px;

    text-decoration:none;

}

#contadorCarrito{

    position:absolute;

    top:-10px;

    right:-12px;

    background:red;

    color:white;

    width:22px;

    height:22px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:12px;

}


/* ========================================================= */
/* PANEL LATERAL                                              */
/* ========================================================= */

#panelCategorias{

    position:fixed;

    top:0;

    left:-320px;

    width:300px;

    height:100%;

background-image: url(./img/fondo.png);
   background-size: cover;
   background-repeat: no-repeat;
   background-position: center;
    justify-content: center; /* CENTRAR HORIZONTAL */
    align-items: center;     /* CENTRAR VERTICAL */   

    padding:25px;

    transition:.4s;

    z-index:999;

    overflow:auto;

}


/* CUANDO SE ABRE */

#panelCategorias.activo{

    left:0;

}


/* ========================================================= */
/* TÍTULO PANEL                                               */
/* ========================================================= */

.tituloCategoria{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

}

#cerrarPanel{

    background:none;

    border:none;

    color:white;

    font-size:22px;

    cursor:pointer;

}


/* ========================================================= */
/* BOTONES CATEGORÍAS                                         */
/* ========================================================= */

.categoria{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    background:#1E293B;

    color:white;

    border:none;

    border-radius:12px;

    cursor:pointer;

    text-align:left;

    font-size:16px;

    transition:.3s;

}

.categoria:hover{

    background:var(--principal);

}


/* ========================================================= */
/* OVERLAY                                                    */
/* ========================================================= */

#overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.55);

    display:none;

    z-index:500;

}

#overlay.activo{

    display:block;

}


/* ========================================================= */
/* PRODUCTOS                                                  */
/* ========================================================= */

.productos{

    padding:40px;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

    gap:30px;

}


/* ========================================================= */
/* TARJETA                                                    */
/* ========================================================= */

.card{

    background:var(--card);

    border-radius:20px;

    overflow:hidden;

    transition:.3s;

    box-shadow:0 10px 20px rgba(0,0,0,.3);

}

.card:hover{

    transform:translateY(-8px);

}


/* ========================================================= */
/* IMAGEN                                                     */
/* ========================================================= */

.card img{

    width:100%;

    height:210px;

    object-fit:cover;

}


/* ========================================================= */
/* CONTENIDO TARJETA                                          */
/* ========================================================= */

.info{

    padding:18px;

}

.info h3{

    margin-bottom:10px;

}

.info p{

    color:var(--gris);

    margin-bottom:12px;

    font-size:14px;

}

.precio{

    font-size:22px;

    color:#22C55E;

    font-weight:bold;

}


/* ========================================================= */
/* BOTÓN AGREGAR                                              */
/* ========================================================= */

.agregar{

    width:100%;

    margin-top:18px;

    border:none;

    background:var(--principal);

    color:rgb(71, 21, 153);

    padding:14px;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;

}

.agregar:hover{

    background:var(--principal-hover);

}


/* ========================================================= */
/* TOAST                                                      */
/* ========================================================= */

#toast{

    position:fixed;

    right:30px;

    bottom:-100px;

    background:#22C55E;

    color:rgb(117, 12, 214);

    padding:18px 25px;

    border-radius:12px;

    display:flex;

    align-items:center;

    gap:10px;

    transition:.5s;

    z-index:9999;

}


/* CUANDO APARECE */

#toast.mostrar{

    bottom:30px;

}


/* ========================================================= */
/* RESPONSIVE TABLET                                          */
/* ========================================================= */

@media(max-width:992px){

    .navbar{

        flex-direction:column;

        gap:20px;

    }

    .acciones{

        width:100%;

        justify-content:center;

        flex-wrap:wrap;

    }

}


/* ========================================================= */
/* RESPONSIVE CELULAR                                         */
/* ========================================================= */

@media(max-width:768px){

    .navbar{

        padding:18px;

    }

    .logo h2{

        font-size:20px;

    }

    .buscador{

        width:100%;

    }

    .buscador input{

        width:100%;

    }

    .productos{

        padding:20px;

        grid-template-columns:1fr;

    }

    #panelCategorias{

        width:260px;

    }

}
    </style>
</head>
<body>
    <!-- ================================================ -->
    <!-- BARRA SUPERIOR                                   -->
    <!-- ================================================ -->

    <header class="navbar">

        <!-- LOGO -->
        <!-- CAMBIAR EL LOGO EN assets/img/logo.png -->

        <div class="logo">

            <img src="../pagina web/img/ico.robot.png" alt="Logo">

            <h2>Smart Dining IA</h2>

        </div>


        <!-- BOTONES -->

        <div class="acciones">

            <!-- BOTÓN CATEGORÍAS -->

            <button id="btnCategorias">

                <i class="fa-solid fa-list"></i>

                Categorías

            </button>

            <!-- BUSCADOR -->

            <div class="buscador">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                type="text"
                id="buscar"
                placeholder="Buscar un plato...">

            </div>

            <!-- CARRITO -->

            <a href="../pagina web/carrito.html" class="carrito">

                <i class="fa-solid fa-cart-shopping"></i>

                <span id="contadorCarrito">0</span>

            </a>

        </div>

    </header>


    <!-- ================================================ -->
    <!-- PANEL LATERAL DE CATEGORÍAS                      -->
    <!-- ================================================ -->

    <aside id="panelCategorias">

        <div class="tituloCategoria">

            <h2>Categorías</h2>

            <button id="cerrarPanel">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <!-- CATEGORÍAS -->
        <!-- SI QUIERES AGREGAR MÁS SOLO DUPLICA UN BOTÓN -->

        <button class="categoria" data-categoria="todos">
            🍽 Todos
        </button>

        <button class="categoria" data-categoria="comidas">
            🍛 Comidas
        </button>

        <button class="categoria" data-categoria="refrescos">
            🥤 Refrescos
        </button>

        <button class="categoria" data-categoria="postres">
            🍰 Postres
        </button>

        <button class="categoria" data-categoria="ceviches">
            🐟 Ceviches
        </button>

    </aside>


    <!-- ================================================ -->
    <!-- FONDO OSCURO CUANDO SE ABRE EL PANEL             -->
    <!-- ================================================ -->

    <div id="overlay"></div>


    <!-- ================================================ -->
    <!-- CONTENEDOR PRODUCTOS                             -->
    <!-- AQUÍ JAVASCRIPT CREARÁ LAS TARJETAS              -->
    <!-- ================================================ -->

    <main>

        <section
        id="contenedorProductos"
        class="productos">

        </section>

    </main>


    <!-- ================================================ -->
    <!-- NOTIFICACIÓN                                     -->
    <!-- APARECERÁ CUANDO AGREGUEN UN PRODUCTO            -->
    <!-- ================================================ -->

    <div id="toast">

        <i class="fa-solid fa-circle-check"></i>

        <span id="mensajeToast">

            Producto agregado

        </span>

    </div>


    <!-- ================================================ -->
    <!-- JAVASCRIPT                                       -->
    <!-- ================================================ -->

    <script>
        /* ========================================================= */
/* SMART DINING IA                                            */
/* ARCHIVO: menu.js                                           */
/* ========================================================= */


/* ========================================================= */
/* LISTA DE PRODUCTOS                                         */
/* AQUÍ AGREGA O MODIFICA TUS PLATOS                          */
/* ========================================================= */

const productos = [

    {
        id:1,
        nombre:"Hamburguesa Clásica",
        categoria:"comidas",
        precio:18,
        descripcion:"Carne, queso y papas fritas.",
        imagen:"../pagina web/img/Hamburguesa clasica.webp"
    },

    {
        id:2,
        nombre:"Lomo Saltado",
        categoria:"comidas",
        precio:28,
        descripcion:"Lomo de res con papas y arroz.",
        imagen:"../pagina web/img/Lomo-Saltado.webp"
    },

    {
        id:3,
        nombre:"Coca Cola",
        categoria:"refrescos",
        precio:5,
        descripcion:"Botella 500 ml.",
        imagen:"../pagina web/img/Coca colaa.jpeg"
    },

    {
        id:4,
        nombre:"Inca Kola",
        categoria:"refrescos",
        precio:5,
        descripcion:"Botella 500 ml.",
        imagen:"../pagina web/img/Inka cola.jpg"
    },

    {
        id:5,
        nombre:"Torta de Chocolate",
        categoria:"postres",
        precio:12,
        descripcion:"Porción individual.",
        imagen:"../pagina web/img/Torta chocolate.jpg"
    },

    {
        id:6,
        nombre:"Ceviche Mixto",
        categoria:"ceviches",
        precio:32,
        descripcion:"Pescado y mariscos.",
        imagen:"../pagina web/img/ceviche mixto.webp"
    }

];


/* ========================================================= */
/* OBTENER ELEMENTOS HTML                                     */
/* ========================================================= */

const contenedor = document.getElementById("contenedorProductos");

const buscar = document.getElementById("buscar");

const contador = document.getElementById("contadorCarrito");

const toast = document.getElementById("toast");

const mensajeToast = document.getElementById("mensajeToast");

const panel = document.getElementById("panelCategorias");

const overlay = document.getElementById("overlay");

const btnCategorias = document.getElementById("btnCategorias");

const cerrarPanel = document.getElementById("cerrarPanel");


/* ========================================================= */
/* CARRITO                                                    */
/* SI NO EXISTE, CREA UNO VACÍO                               */
/* ========================================================= */

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];


/* ========================================================= */
/* MOSTRAR PRODUCTOS                                           */
/* ========================================================= */

function mostrarProductos(lista){

    contenedor.innerHTML="";

    lista.forEach(producto=>{

        contenedor.innerHTML += `

        <div class="card">

            <img src="${producto.imagen}" alt="${producto.nombre}">

            <div class="info">

                <h3>${producto.nombre}</h3>

                <p>${producto.descripcion}</p>

                <div class="precio">

                    S/${producto.precio}

                </div>

                <button
                class="agregar"
                onclick="agregarCarrito(${producto.id})">

                <i class="fa-solid fa-cart-plus"></i>

                Agregar

                </button>

            </div>

        </div>

        `;

    });

}


/* ========================================================= */
/* AGREGAR AL CARRITO                                          */
/* ========================================================= */

function agregarCarrito(id){

    const producto = productos.find(p=>p.id===id);

    carrito.push(producto);

    localStorage.setItem("carrito",JSON.stringify(carrito));

    actualizarContador();

    mostrarToast(producto.nombre);

}


/* ========================================================= */
/* ACTUALIZAR CONTADOR                                         */
/* ========================================================= */

function actualizarContador(){

    contador.textContent = carrito.length;

}


/* ========================================================= */
/* MOSTRAR TOAST                                               */
/* ========================================================= */

function mostrarToast(nombre){

    mensajeToast.textContent = `${nombre} agregado al carrito`;

    toast.classList.add("mostrar");

    setTimeout(()=>{

        toast.classList.remove("mostrar");

    },2500);

}


/* ========================================================= */
/* BUSCADOR                                                    */
/* ========================================================= */

buscar.addEventListener("keyup",()=>{

    const texto = buscar.value.toLowerCase();

    const resultado = productos.filter(producto=>

        producto.nombre.toLowerCase().includes(texto)

    );

    mostrarProductos(resultado);

});


/* ========================================================= */
/* FILTRAR POR CATEGORÍA                                       */
/* ========================================================= */

document.querySelectorAll(".categoria").forEach(boton=>{

    boton.addEventListener("click",()=>{

        const categoria = boton.dataset.categoria;

        if(categoria==="todos"){

            mostrarProductos(productos);

        }else{

            const filtrados = productos.filter(producto=>

                producto.categoria===categoria

            );

            mostrarProductos(filtrados);

        }

        panel.classList.remove("activo");

        overlay.classList.remove("activo");

    });

});


/* ========================================================= */
/* ABRIR PANEL                                                 */
/* ========================================================= */

btnCategorias.addEventListener("click",()=>{

    panel.classList.add("activo");

    overlay.classList.add("activo");

});


/* ========================================================= */
/* CERRAR PANEL                                                */
/* ========================================================= */

cerrarPanel.addEventListener("click",()=>{

    panel.classList.remove("activo");

    overlay.classList.remove("activo");

});


overlay.addEventListener("click",()=>{

    panel.classList.remove("activo");

    overlay.classList.remove("activo");

});


/* ========================================================= */
/* CARGAR LA PÁGINA                                            */
/* ========================================================= */

mostrarProductos(productos);

actualizarContador();
    </script>

</body>
</html>
